<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V Viva Skin & Hair Clinic | Dr. Neelima Potluri | Jubilee Hills, Hyderabad</title>
<meta name="description" content="Advanced dermatology care by Dr. Neelima Potluri at V Viva Skin & Hair Clinic, Jubilee Hills, Hyderabad. Specializing in PRP, hair fall treatment, acne scars, chemical peels.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #FAF7F2;
    --warm-white: #F5F0E8;
    --sage: #8B9E8A;
    --sage-light: #C4D0C3;
    --sage-dark: #5C7A5B;
    --charcoal: #2C2C2C;
    --charcoal-light: #4A4A4A;
    --gold: #B8965A;
    --gold-light: #D4B07A;
    --blush: #E8DDD3;
    --text-muted: #7A7A7A;
    --border: rgba(139,158,138,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ivory);
    color: var(--charcoal);
    overflow-x: hidden;
    font-size: 16px;
    line-height: 1.7;
  }

  h1, h2, h3, h4 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    line-height: 1.2;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw;
    height: 72px;
    background: rgba(250,247,242,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    transition: box-shadow 0.3s;
  }
  nav.scrolled { box-shadow: 0 2px 24px rgba(0,0,0,0.07); }

  .nav-logo {
    display: flex; flex-direction: column;
  }
  .nav-logo-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--charcoal);
    line-height: 1;
  }
  .nav-logo-sub {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sage-dark);
    margin-top: 3px;
  }

  .nav-links {
    display: flex; gap: 2.5rem; list-style: none;
  }
  .nav-links a {
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--charcoal-light);
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--sage-dark); }

  .nav-cta {
    background: var(--sage-dark);
    color: white !important;
    padding: 10px 22px;
    border-radius: 2px;
    letter-spacing: 0.1em !important;
    font-size: 0.75rem !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--charcoal) !important; color: white !important; }

  .hamburger {
    display: none;
    flex-direction: column; gap: 5px; cursor: pointer; padding: 4px;
  }
  .hamburger span {
    width: 24px; height: 1.5px; background: var(--charcoal); transition: all 0.3s;
    display: block;
  }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: 72px;
  }

  .hero-left {
    display: flex; flex-direction: column; justify-content: center;
    padding: 6vw 4vw 6vw 7vw;
    position: relative;
  }

  .hero-eyebrow {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 2rem;
  }
  .hero-eyebrow-line {
    width: 40px; height: 1px; background: var(--gold);
  }
  .hero-eyebrow-text {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  .hero-h1 {
    font-size: clamp(3rem, 5vw, 5.5rem);
    font-weight: 300;
    color: var(--charcoal);
    margin-bottom: 1.5rem;
    letter-spacing: -0.01em;
  }
  .hero-h1 em {
    font-style: italic;
    color: var(--sage-dark);
  }

  .hero-desc {
    font-size: 1rem;
    color: var(--text-muted);
    max-width: 440px;
    margin-bottom: 2.5rem;
    line-height: 1.8;
    font-weight: 300;
  }

  .hero-rating {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 2.5rem;
    padding: 16px 20px;
    background: white;
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    width: fit-content;
    border-radius: 2px;
  }
  .stars { color: var(--gold); font-size: 1rem; letter-spacing: 2px; }
  .rating-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 500;
    color: var(--charcoal);
    line-height: 1;
  }
  .rating-meta {
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .rating-divider { width: 1px; height: 36px; background: var(--border); }

  .hero-actions {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--sage-dark);
    color: white;
    padding: 16px 36px;
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.25s;
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 500;
  }
  .btn-primary:hover { background: var(--charcoal); transform: translateY(-1px); }

  .btn-secondary {
    color: var(--charcoal);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--charcoal);
    padding-bottom: 2px;
    transition: color 0.2s;
    font-weight: 500;
  }
  .btn-secondary:hover { color: var(--sage-dark); border-color: var(--sage-dark); }

  .hero-right {
    position: relative;
    overflow: hidden;
    background: linear-gradient(145deg, var(--sage-light) 0%, var(--blush) 60%, var(--warm-white) 100%);
  }

  .hero-img-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to right, var(--ivory) 0%, transparent 15%);
    z-index: 2;
  }

  .hero-visual {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .hero-circle-bg {
    width: 70%; aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(139,158,138,0.3), rgba(184,150,90,0.1));
    position: absolute;
  }

  .hero-badge-group {
    position: absolute; z-index: 3;
    display: flex; flex-direction: column; gap: 12px;
    right: 7%; top: 50%; transform: translateY(-50%);
  }

  .hero-badge {
    background: white;
    border: 1px solid var(--border);
    padding: 14px 18px;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    width: 180px;
    opacity: 0;
    animation: fadeSlideIn 0.6s ease forwards;
  }
  .hero-badge:nth-child(1) { animation-delay: 0.3s; }
  .hero-badge:nth-child(2) { animation-delay: 0.5s; }
  .hero-badge:nth-child(3) { animation-delay: 0.7s; }

  .badge-icon { font-size: 1.5rem; margin-bottom: 6px; display: block; }
  .badge-title { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 500; color: var(--charcoal); display: block; }
  .badge-desc { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; display: block; }

  .hero-texture {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(139,158,138,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 1;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateX(16px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ── SECTION BASICS ── */
  section { padding: 100px 7vw; }

  .section-tag {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 1.2rem;
  }
  .section-tag-line { width: 30px; height: 1px; background: var(--gold); }
  .section-tag-text {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  .section-h2 {
    font-size: clamp(2.2rem, 3.5vw, 3.8rem);
    font-weight: 300;
    margin-bottom: 1.2rem;
    line-height: 1.15;
  }
  .section-h2 em { font-style: italic; color: var(--sage-dark); }

  .section-intro {
    font-size: 1rem;
    color: var(--text-muted);
    max-width: 560px;
    font-weight: 300;
    line-height: 1.85;
  }

  /* ── TRUST BAR ── */
  #trust {
    background: var(--charcoal);
    padding: 40px 7vw;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 24px;
  }
  .trust-item {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; flex: 1; min-width: 140px;
  }
  .trust-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    color: var(--gold-light);
    line-height: 1;
  }
  .trust-label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
  }
  .trust-divider {
    width: 1px; height: 60px;
    background: rgba(255,255,255,0.1);
  }

  /* ── SERVICES ── */
  #services { background: var(--warm-white); }

  .services-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 60px; flex-wrap: wrap; gap: 24px;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2px;
  }

  .service-category {
    background: white;
    padding: 48px 40px;
  }

  .service-category-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .service-category-icon {
    width: 48px; height: 48px;
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .service-category-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--charcoal);
  }
  .service-category-sub {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .service-list { list-style: none; }
  .service-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .service-item:last-child { border-bottom: none; }
  .service-item-name {
    font-size: 0.95rem;
    color: var(--charcoal);
    font-weight: 400;
  }
  .service-item-tag {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sage-dark);
    background: rgba(92,122,91,0.08);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .service-feature {
    margin-top: 28px;
    padding: 20px;
    background: var(--ivory);
    border-left: 2px solid var(--sage);
    border-radius: 0 4px 4px 0;
  }
  .service-feature p {
    font-size: 0.85rem;
    color: var(--charcoal-light);
    line-height: 1.7;
  }

  /* ── ABOUT CLINIC ── */
  #about {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-visual {
    position: relative;
  }
  .about-main-card {
    background: var(--charcoal);
    padding: 48px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .about-card-pattern {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(139,158,138,0.12) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .about-card-content { position: relative; z-index: 1; }
  .about-card-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 20px;
    display: block;
  }
  .about-card-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    color: white;
    line-height: 1.4;
    font-style: italic;
  }
  .about-card-attr {
    margin-top: 24px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
  }

  .about-stat-row {
    display: flex; gap: 16px; margin-top: 16px;
  }
  .about-stat-box {
    flex: 1;
    background: white;
    border: 1px solid var(--border);
    padding: 20px;
    text-align: center;
    border-radius: 4px;
  }
  .about-stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 400;
    color: var(--sage-dark);
    line-height: 1;
  }
  .about-stat-lbl {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .about-content {}
  .about-points { margin-top: 32px; display: flex; flex-direction: column; gap: 20px; }
  .about-point {
    display: flex; gap: 16px; align-items: flex-start;
  }
  .about-point-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--sage-dark); margin-top: 7px; flex-shrink: 0;
  }
  .about-point-text { font-size: 0.92rem; color: var(--charcoal-light); line-height: 1.75; }

  /* ── DOCTOR ── */
  #doctor { background: var(--warm-white); }

  .doctor-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 80px;
    align-items: start;
    margin-top: 60px;
  }

  .doctor-card {
    background: white;
    border: 1px solid var(--border);
    overflow: hidden;
    border-radius: 4px;
    position: sticky; top: 100px;
  }

  .doctor-card-portrait {
    height: 300px;
    background: linear-gradient(135deg, var(--sage-light), var(--blush));
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .portrait-initials {
    font-family: 'Cormorant Garamond', serif;
    font-size: 5rem;
    color: rgba(92,122,91,0.4);
    font-weight: 300;
    font-style: italic;
  }
  .portrait-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(44,44,44,0.85);
    color: white;
    padding: 16px 20px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
  }

  .doctor-card-body { padding: 28px; }
  .doctor-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--charcoal);
    margin-bottom: 4px;
  }
  .doctor-title {
    font-size: 0.78rem;
    color: var(--sage-dark);
    letter-spacing: 0.05em;
    margin-bottom: 20px;
  }
  .doctor-credentials {
    list-style: none;
    display: flex; flex-direction: column; gap: 8px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .doctor-credential {
    font-size: 0.82rem;
    color: var(--charcoal-light);
    display: flex; align-items: center; gap: 10px;
  }
  .doctor-credential::before {
    content: '';
    width: 5px; height: 5px; background: var(--gold);
    border-radius: 50%; flex-shrink: 0;
  }

  .doctor-info {}
  .doctor-philosophy {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.65rem;
    font-weight: 300;
    color: var(--charcoal);
    line-height: 1.5;
    font-style: italic;
    margin-bottom: 28px;
    padding-left: 20px;
    border-left: 2px solid var(--gold);
  }
  .doctor-bio-section { margin-bottom: 28px; }
  .doctor-bio-label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    display: block;
  }
  .doctor-bio-text {
    font-size: 0.95rem;
    color: var(--charcoal-light);
    line-height: 1.8;
    font-weight: 300;
  }

  /* ── INFRASTRUCTURE ── */
  #infra {}
  .infra-header { margin-bottom: 60px; }
  .infra-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-bottom: 2px;
  }
  .infra-card {
    background: var(--warm-white);
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }
  .infra-card:hover { background: white; }
  .infra-card-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    font-weight: 300;
    color: var(--sage-light);
    position: absolute; top: 20px; right: 24px;
    line-height: 1;
  }
  .infra-card-icon { font-size: 1.8rem; margin-bottom: 16px; display: block; }
  .infra-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 500;
    margin-bottom: 10px;
    color: var(--charcoal);
  }
  .infra-card-desc {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.75;
  }

  .infra-bottom {
    background: var(--charcoal);
    padding: 40px 60px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 20px;
  }
  .infra-bottom-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    color: white;
    font-weight: 300;
    max-width: 500px;
  }

  /* ── REVIEWS ── */
  #reviews { background: var(--warm-white); }
  .reviews-header { margin-bottom: 60px; }
  .reviews-summary {
    display: flex; align-items: center; gap: 40px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }
  .reviews-score {
    text-align: center;
    padding: 32px 40px;
    background: var(--charcoal);
    border-radius: 4px;
    flex-shrink: 0;
  }
  .reviews-score-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    color: var(--gold-light);
    line-height: 1;
    display: block;
  }
  .reviews-score-stars { color: var(--gold-light); font-size: 1.1rem; margin: 8px 0; display: block; letter-spacing: 3px; }
  .reviews-score-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-transform: uppercase; }

  .reviews-breakdown { flex: 1; }
  .breakdown-item {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .breakdown-label { font-size: 0.8rem; color: var(--text-muted); width: 40px; }
  .breakdown-bar {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .breakdown-fill { height: 100%; background: var(--gold); border-radius: 2px; }
  .breakdown-count { font-size: 0.75rem; color: var(--text-muted); width: 20px; text-align: right; }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .review-card {
    background: white;
    padding: 32px;
    border-radius: 4px;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }
  .review-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.07); }
  .review-stars { color: var(--gold); font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 14px; }
  .review-text {
    font-size: 0.9rem;
    color: var(--charcoal-light);
    line-height: 1.8;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    margin-bottom: 20px;
  }
  .review-author {
    display: flex; align-items: center; gap: 12px;
  }
  .review-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--sage-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    color: var(--sage-dark);
    font-weight: 500;
  }
  .review-name { font-size: 0.82rem; font-weight: 500; color: var(--charcoal); }
  .review-date { font-size: 0.72rem; color: var(--text-muted); }

  /* ── APPOINTMENT ── */
  #appointment {
    background: var(--charcoal);
    text-align: center;
    padding: 100px 7vw;
    position: relative; overflow: hidden;
  }
  .appt-bg-pattern {
    position: absolute; inset: 0;
